name: Deploy Presentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'meetup-coding-with-ai.html'
      - 'presentation-skraft-agents.html'
      - 'assets/**'
      - '.github/workflows/deploy-presentation.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp meetup-coding-with-ai.html _site/index.html
          if [ -d assets ]; then cp -r assets _site/assets; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
