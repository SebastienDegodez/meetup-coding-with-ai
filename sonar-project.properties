sonar.projectKey=SebastienDegodez_meetup-coding-with-ai
sonar.projectName=MonAssurance-Clean-Architecture

# Organization
sonar.organization=sebastiendegodez

# Sources
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# C# specific settings
sonar.language=cs
sonar.cs.opencover.reportsPaths=**/coverage.xml

# Exclusions
sonar.exclusions=**/bin/**,**/obj/**,**/*.g.cs
sonar.test.exclusions=**/bin/**,**/obj/**

# Issue severity
sonar.issue.ignore.multiline=true

# Rules
sonar.cs.roslyn.analyzers=true

# Code coverage
sonar.coverage.exclusions=**/*Tests/**,**/*Markers/**

# Severity threshold
sonar.pullrequest.provider=github
