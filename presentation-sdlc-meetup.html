<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SDLC avec les Agents IA</title>
  <style>
    :root {
      --bg: #0b1117;
      --panel: rgba(16, 25, 34, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.03);
      --text: #d7ffe3;
      --muted: #8ab39c;
      --accent: #00ff41;
      --accent-2: #86f7a9;
      --danger: #ff7b72;
      --success: #7ee787;
      --line: rgba(0, 255, 65, 0.14);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
      --slide-pad: clamp(1rem, 4vw, 3.5rem);
    }
    html, body { margin: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }
    html { scroll-snap-type: y mandatory; }
    body { font-family: "JetBrains Mono", "SFMono-Regular", Menlo, monospace; }
    .deck { width: 100%; }
    .slide {
      width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; scroll-snap-align: start;
      position: relative; display: grid; place-items: stretch; box-sizing: border-box;
      padding: var(--slide-pad);
      background: radial-gradient(circle at 80% 10%, rgba(0,255,65,.07), transparent 28%), linear-gradient(180deg, #0b1117, #05090d 100%);
    }
    .slide::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,.9), rgba(0,0,0,.35) 72%, transparent 100%);
      opacity: .45;
    }
    .slide-content {
      position: relative; z-index: 1; height: 100%; max-height: 100%; overflow: hidden;
      display: grid; gap: clamp(.85rem, 2vw, 1.4rem);
      align-items: center;
    }
    .hero { grid-template-columns: 1.05fr .95fr; }
    .split { grid-template-columns: 1fr 1fr; }
    .stack { grid-template-columns: 1fr; }
    .kicker {
      display: inline-flex; align-items: center; gap: .6rem;
      padding: .45rem .8rem; border-radius: 999px; background: rgba(255,255,255,.05);
      color: var(--accent-2); font-size: clamp(.68rem, 1vw, .9rem); letter-spacing: .16em; text-transform: uppercase;
      border: 1px solid rgba(0,255,65,.18);
    }
    h1, h2, h3 { margin: 0; letter-spacing: -.05em; }
    h1 { font-size: clamp(2.2rem, 6vw, 5.6rem); line-height: .92; max-width: 11ch; }
    h2 { font-size: clamp(1.5rem, 4vw, 3rem); line-height: 1.02; max-width: 14ch; }
    h3 { font-size: clamp(1.1rem, 2vw, 1.7rem); line-height: 1.1; }
    p, li, td { font-size: clamp(.82rem, 1.35vw, 1.06rem); line-height: 1.55; }
    .lede { color: var(--muted); max-width: 40rem; }
    .tone { color: #f1fff4; }
    .panel {
      background: var(--panel); border: 1px solid rgba(0,255,65,.22); border-radius: 1.35rem; box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel .head { display: flex; justify-content: space-between; gap: 1rem; align-items: center; padding: .9rem 1rem; border-bottom: 1px solid rgba(0,255,65,.12); color: var(--accent-2); letter-spacing: .14em; text-transform: uppercase; font-size: .76rem; }
    .panel .body { padding: 1rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .8rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: .8rem; }
    .card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); border-radius: 1rem; padding: .9rem 1rem; overflow: hidden; }
    .small { font-size: .78rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
    .bullets { margin: 0; padding-left: 1.1rem; display: grid; gap: .55rem; }
    .bullets li { color: #effff4; }
    .list-tight { gap: .35rem; }
    .table { width: 100%; border-collapse: collapse; font-size: clamp(.76rem, 1.1vw, .95rem); }
    .table th, .table td { padding: .5rem .55rem; border-bottom: 1px solid rgba(255,255,255,.07); text-align: left; vertical-align: top; }
    .table th { color: var(--accent-2); font-size: .76rem; text-transform: uppercase; letter-spacing: .12em; }
    .code { margin: 0; padding: 1rem; background: #05090d; border-radius: 1rem; border: 1px solid rgba(0,255,65,.16); color: #d7ffe3; overflow: hidden; font-size: clamp(.72rem, 1.1vw, .92rem); line-height: 1.55; }
    .del { color: var(--danger); }
    .add { color: var(--success); }
    .quote { font-size: clamp(1.1rem, 2.2vw, 2rem); line-height: 1.3; max-width: 24ch; }
    .badge { display: inline-flex; align-items: center; gap: .4rem; padding: .4rem .7rem; border-radius: 999px; background: rgba(0,255,65,.08); border: 1px solid rgba(0,255,65,.18); color: var(--accent); font-size: .76rem; letter-spacing: .12em; text-transform: uppercase; }
    .img { width: 100%; max-height: min(40vh, 330px); object-fit: contain; border-radius: 1rem; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.02); }
    .caption { color: var(--muted); font-size: .82rem; }
    .timeline { display: grid; gap: .65rem; }
    .timeline-row { display: grid; grid-template-columns: 5rem 1fr 1fr 1fr; gap: .6rem; padding: .55rem .7rem; border-radius: .9rem; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); font-size: .84rem; }
    .timeline-row.head { color: var(--accent-2); text-transform: uppercase; letter-spacing: .12em; font-size: .72rem; background: transparent; border: none; padding-bottom: 0; }
    .commit-card { display: grid; grid-template-columns: 1fr; gap: .55rem; }
    .commit-card.has-diff { grid-template-columns: .9fr 1.1fr; align-items: start; gap: .85rem; }
    .commit-media { display: grid; gap: .55rem; }
    .commit-photo { width: 100%; max-height: min(27vh, 230px); object-fit: contain; border-radius: 1rem; border: 1px solid rgba(0,255,65,.18); background: #091015; }
    .commit-card.has-diff .commit-photo { max-height: min(23vh, 190px); }
    .diff-block { margin: 0; padding: .95rem 1rem; white-space: pre-wrap; font-size: clamp(.7rem, 1vw, .9rem); line-height: 1.5; }
    .sequence-board { display: grid; gap: .85rem; }
    .sequence-track { display: flex; gap: .45rem; align-items: stretch; }
    .sequence-node {
      flex: 1 1 0; min-width: 0; display: grid; gap: .35rem; align-content: start;
      padding: .78rem .82rem; border-radius: 1rem; background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
    }
    .sequence-node strong { color: var(--accent-2); font-size: .68rem; letter-spacing: .13em; text-transform: uppercase; }
    .sequence-node span { color: #effff4; font-size: .8rem; line-height: 1.35; }
    .sequence-arrow { flex: 0 0 .9rem; display: grid; place-items: center; color: var(--accent); font-size: 1.2rem; opacity: .95; }
    .sequence-notes { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: .6rem; }
    .sequence-note { background: rgba(0,255,65,.05); border: 1px solid rgba(0,255,65,.14); border-radius: .85rem; padding: .65rem .75rem; color: var(--muted); font-size: .74rem; line-height: 1.45; }
    .progression-stack { display: grid; gap: .65rem; }
    .progression-item { border: 1px solid rgba(255,255,255,.06); border-radius: .95rem; padding: .75rem .85rem; background: rgba(255,255,255,.03); }
    .progression-item .label { display: flex; justify-content: space-between; gap: .75rem; color: var(--accent-2); text-transform: uppercase; letter-spacing: .12em; font-size: .7rem; margin-bottom: .42rem; }
    .progression-item .code { font-size: clamp(.68rem, .95vw, .84rem); }
    .footer {
      position: absolute; left: var(--slide-pad); right: var(--slide-pad); bottom: .7rem; z-index: 2;
      display: flex; justify-content: space-between; gap: 1rem; color: rgba(215,255,227,.68); font-size: .74rem; letter-spacing: .08em; text-transform: uppercase;
    }
    .chrome {
      position: fixed; left: 1rem; right: 1rem; bottom: 1rem; z-index: 10;
      display: flex; justify-content: space-between; align-items: center; gap: 1rem;
      padding: .7rem .9rem; border: 1px solid rgba(0,255,65,.16); border-radius: 999px;
      background: rgba(5,9,13,.82); backdrop-filter: blur(8px); color: var(--text);
    }
    .chrome b { color: var(--accent); }
    .dots { display: flex; gap: .35rem; }
    .dot { width: .48rem; height: .48rem; border-radius: 50%; background: rgba(215,255,227,.2); }
    .dot.active { background: var(--accent); box-shadow: 0 0 16px rgba(0,255,65,.45); }
    .hint { color: var(--muted); font-size: .78rem; }
    .reveal { opacity: 0; transform: translateY(14px); transition: opacity 380ms ease, transform 380ms ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    @media (max-width: 900px) {
      .hero, .split { grid-template-columns: 1fr; }
      .commit-card.has-diff { grid-template-columns: 1fr; }
      .sequence-track { flex-wrap: wrap; }
      .sequence-arrow { display: none; }
      .sequence-node { flex-basis: calc(50% - .23rem); }
      .sequence-notes { grid-template-columns: 1fr; }
      .timeline-row { grid-template-columns: 4rem 1fr; }
      .timeline-row span:nth-child(n+3) { display: none; }
      .chrome { border-radius: 20px; }
      .hint { display: none; }
    }
    @media (max-height: 700px) {
      .slide { padding: clamp(.75rem, 3vw, 1.8rem); }
    }
    @media (max-height: 600px) {
      .chrome { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="deck" id="deck"></main>
  <div class="chrome" aria-live="polite">
    <div><b>SDLC avec les Agents IA</b> <span class="hint">← → · molette · swipe</span></div>
    <div class="dots" id="dots"></div>
    <div id="counter">1 / 25</div>
  </div>

  <script>
    const slides = [
      { kind: 'hero', kicker: 'Replay de session · 16 mai 2026', title: '4 agents, 1 feature, 0 compromis.', body: 'Une vraie session SDLC, racontée comme un replay: le journal devient le fil rouge, les commits servent de preuves, et les skills rendent la méthode lisible pour l’audience.', meta: '<span class="badge">Talk meetup</span> <span class="badge">Plan · Code · Review</span>', side: '<div class="panel"><div class="head"><span>Storyboard</span><span>25 slides</span></div><div class="body"><p class="lede">Le talk ne vend pas une abstraction. Il montre comment le workflow, les agents et le craft se combinent en conditions réelles.</p><img class="img" src="assets/devops-ia.png" alt="Loop SDLC avec GitHub Copilot" /></div></div>' },
      { kind: 'split', kicker: 'Le paradoxe', title: 'L’IA peut écrire du code qui compile. Ça ne suffit pas.', left: '<p class="quote reveal">Le vrai sujet n’est pas la génération. C’est la cohérence architecturale et la capacité à prouver le comportement.</p>', right: '<div class="panel"><div class="head"><span>Question</span><span>audience</span></div><div class="body"><ul class="bullets"><li>Qui a déjà vu un code “bon à compiler” mais faux métier ?</li><li>Qui a déjà perdu du temps à corriger après coup ?</li><li>Qui veut voir un workflow qui limite ces erreurs ?</li></ul></div></div>' },
      { kind: 'split', kicker: 'Workflow', title: 'Le SDLC devient une boucle visible.', left: '<div class="panel"><div class="head"><span>Plan → Brainstorm → Design</span><span>Code → Review</span></div><div class="body"><p class="lede">La boucle fait le lien entre les besoins métier, les décisions d’architecture et la preuve par les tests.</p><div class="code"><span class="del">- chaos</span><br><span class="add">+ workflow guidé</span><br><span class="add">+ preuves visibles</span></div></div></div>', right: '<img class="img" src="assets/devops-ia.png" alt="SDLC loop" />' },
      { kind: 'split', kicker: 'Le cast', title: 'SKRAFT SDLC', left: '<div class="panel"><div class="head"><span>Règle d’accès</span><span>une seule porte</span></div><div class="body"><p class="lede">L’utilisateur parle à <b>/sdlc</b>. L’orchestrateur relit l’état et route la bonne phase sans exposer les sous-agents.</p></div></div>', right: '<div class="panel sequence-board"><div class="head"><span>Workflow</span><span>stateful</span></div><div class="body"><div class="sequence-track"><div class="sequence-node"><strong>Utilisateur</strong><span>/sdlc</span></div><div class="sequence-arrow">→</div><div class="sequence-node"><strong>Orchestrateur</strong><span>state.md</span></div><div class="sequence-arrow">→</div><div class="sequence-node"><strong>Discover / Plan</strong><span>triage → stories</span></div><div class="sequence-arrow">→</div><div class="sequence-node"><strong>Design / Distill</strong><span>ADR → feature</span></div><div class="sequence-arrow">→</div><div class="sequence-node"><strong>Deliver / Review</strong><span>code → verdict</span></div></div><div class="sequence-note">Un seul point d’entrée. Les sous-agents restent internes.</div></div></div>' },
      { kind: 'split', kicker: 'Skill', title: 'Un skill, c’est du contexte compressé.', left: '<div class="panel"><div class="head"><span>Réduction de tokens</span><span>moins de bruit</span></div><div class="body"><p class="lede">Au lieu de réexpliquer la même règle à chaque prompt, on charge une instruction courte, ciblée et stable.</p><div class="code"><span class="del">- expliquer tout le contexte à chaque fois</span><br><span class="add">+ charger le skill une fois</span><br><span class="add">+ garder la discussion focalisée</span></div></div></div>', right: '<div class="panel"><div class="head"><span>Effet</span><span>audience</span></div><div class="body"><ul class="bullets"><li>moins de dérive</li><li>moins de tokens</li><li>plus de rigueur</li><li>plus de vitesse utile</li></ul></div></div>' },
      { kind: 'split', kicker: 'BDD', title: 'Gherkin Gate: le contrat métier avant le code.', left: '<div class="panel"><div class="head"><span>Avant</span><span>Après</span></div><div class="body"><p class="lede">Le scénario décrit le métier, les exemples cadrent le comportement, et la spec fixe la conversation avant l’implémentation.</p></div></div>', right: '<div class="panel"><div class="head"><span>Timeline</span><span>Evidence</span></div><div class="body"><div class="timeline"><div class="timeline-row head"><span>Étape</span><span>Artefact</span><span>Rôle</span><span>Validation</span></div><div class="timeline-row"><span>BDD</span><span>features/eligibilite.feature</span><span>métier</span><span>lecture</span></div><div class="timeline-row"><span>Spec</span><span>reviewée par agent</span><span>alignement</span><span>approved</span></div><div class="timeline-row"><span>Plan</span><span>tasks / commits</span><span>ordre</span><span>approved</span></div></div></div></div>' },
      { kind: 'code', kicker: 'Feature', title: 'Le `.feature` parle métier, pas technique.', code: '<span class="del"># complexité inutile</span><br><span class="add"># âge minimum selon véhicule</span><br><span class="add">Scénario: Refus de souscription voiture pour un mineur</span><br><span class="add">Plan du Scénario: Vérification de l\'âge minimum selon le type de véhicule</span><br><span class="add">Exemples: Conducteurs mineurs refusés</span><br><span class="add">| 17 | Voiture | refusée ... |</span>' },
      { kind: 'split', kicker: 'Design choices', title: 'Cinq décisions délibérées en une session.', left: '<div class="panel"><div class="head"><span>ChoiX</span><span>résumé</span></div><div class="body"><ul class="bullets list-tight"><li>résultat simple en sortie</li><li>API POST /eligibility</li><li>Domain pour les règles</li><li>Match&lt;T&gt; pour l’encapsulation</li><li>Tests au bon niveau</li></ul></div></div>', right: '<div class="panel"><div class="head"><span>Pourquoi ça compte</span><span>craft</span></div><div class="body"><p class="lede">Le talk montre que le craft ne disparaît pas avec l’IA. Il devient plus visible parce que les décisions sont explicites et rejouables.</p></div></div>' },
      { kind: 'image', kicker: 'Clean Architecture', title: 'Domain rules first.', image: 'assets/outside-in-tdd.png', caption: 'Image: cercles Clean Architecture, lecture très claire des couches.' },
      { kind: 'commit', kicker: 'Revue de plan', title: 'Test manquant.', image: '.ecc-design/commits/4fcae4c.png', caption: 'Photo locale du commit 4fcae4c · Wishful Thinking' },
      { kind: 'split', kicker: 'Review agents', title: 'Les agents de review gardent le fil tendu.', left: '<div class="panel"><div class="head"><span>Spec</span><span>Plan</span></div><div class="body"><ul class="bullets"><li>corrigent les incohérences</li><li>détectent les oublis</li><li>évite les dérives de vocabulaire</li></ul></div></div>', right: '<div class="panel"><div class="head"><span>Impact</span><span>session</span></div><div class="body"><p class="lede">La review n’est pas décorative. Elle améliore le contrat entre ce qui est dit, ce qui est planifié et ce qui est codé.</p></div></div>' },
      { kind: 'image', kicker: 'AI TDD', title: 'AI TDD.', image: 'assets/outside-in-tdd.png', caption: 'Partie droite de l’image: workflow AI TDD.' },
      { kind: 'split', kicker: 'TDD', title: 'Wishful Thinking n’est pas un RED.', left: '<div class="panel"><div class="head"><span>Phase 1</span><span>Wishful Thinking</span></div><div class="body"><p class="lede">Quand le code n’existe pas encore, une erreur de compilation est utile mais ce n’est pas la preuve qu’un comportement a échoué.</p><div class="code"><span class="del">- compilation error</span><br><span class="add">+ information discovery</span></div></div></div>', right: '<div class="panel"><div class="head"><span>Phase 2</span><span>TRUE RED</span></div><div class="body"><p class="lede">Le vrai RED arrive quand le test exécute du code réel et échoue sur le comportement attendu.</p><div class="code"><span class="del">- Assert.True failed</span><br><span class="add">+ behavior captured</span></div></div></div>' },
      { kind: 'split', kicker: 'Outside-In', title: 'On commence par l’Application.', left: '<div class="panel"><div class="head"><span>Départ</span><span>handler</span></div><div class="body"><p class="lede">Le besoin métier se matérialise d’abord dans le handler, puis le Domain émerge des décisions nécessaires.</p></div></div>', right: '<div class="panel"><div class="head"><span>Message</span><span>audience</span></div><div class="body"><p class="quote">On ne code pas la base. On révèle la forme du problème en partant de l’extérieur.</p></div></div>' },
      { kind: 'commit', kicker: 'Phase de wishful thinking', title: 'Handler absent.', image: '.ecc-design/commits/4fcae4c.png', caption: 'Commit photo locale · CS0234 confirmant l’absence du handler.' },
      { kind: 'commit', kicker: 'TRUE RED', title: 'True RED.', image: '.ecc-design/commits/387c79d.png', diff: '+ using MonAssurance.Domain.Eligibility;\n+\n+namespace MonAssurance.Application.Eligibility.Queries.CheckEligibility;\n+\n+public sealed class CheckEligibilityQueryHandler\n+{\n+    public EligibilityViewModel Handle(CheckEligibilityQuery query)', caption: 'Commit photo locale · Assertion failure sur le skeleton.' },
      { kind: 'split', kicker: 'Dashboard', title: 'La progression se lit comme une suite de diffs.', left: '<div class="panel"><div class="head"><span>Lecture</span><span>progressive</span></div><div class="body"><p class="lede">Chaque étape fait avancer une seule idée: d’abord le squelette, ensuite la règle métier.</p><div class="code"><span class="del">- code qui compile sans preuve</span><br><span class="add">+ diffs courts</span></div></div></div>', right: '<div class="panel"><div class="head"><span>Two step story</span><span>code first</span></div><div class="body"><div class="progression-stack"><div class="progression-item"><div class="label"><span>Wishful</span><span>handler absent</span></div><pre class="code diff-block">+ using MonAssurance.Domain.Eligibility;\n+\n+ public sealed class CheckEligibilityQueryHandler\n+ {\n+     public EligibilityViewModel Handle(CheckEligibilityQuery query)</pre></div><div class="progression-item"><div class="label"><span>Rule</span><span>age minimum</span></div><pre class="code diff-block">+ if (driver.Age(today) < vehicle.MinimumAge())\n+     return EligibilityResult.Refused("Conducteur trop jeune pour ce véhicule");\n+\n+ return EligibilityResult.Accepted();</pre></div></div></div></div>' },
      { kind: 'commit', kicker: 'Evidence', title: '7 passed / 1 failed.', image: '.ecc-design/commits/ae78bd0.png', diff: '+ if (vehicle.IsHighPowerMotorcycle() && !driver.HasEnoughExperience(5))\n+     return EligibilityResult.Refused("Expérience insuffisante pour la puissance");\n+\n+ return EligibilityResult.Accepted();', caption: 'Deux tests passent pour la mauvaise raison, un seul porte le vrai RED.' },
      { kind: 'commit', kicker: 'TDD debt', title: 'Assert explicite.', image: '.ecc-design/commits/e047894.png', diff: '- result.Match(\n-     onAccepted: () => true,\n-     onRefused: _ => throw new Exception());\n+ var ok = result.Match(\n+     onAccepted: () => true,\n+     onRefused: _ => false);\n+ Assert.True(ok);', caption: 'Match<T> sans Assert → Assert explicite ajouté.' },
      { kind: 'commit', kicker: 'GREEN', title: 'Endpoint final.', image: '.ecc-design/commits/49a1d45.png', diff: '+ app.MapPost("/eligibility", (\n+     CheckEligibilityQuery query,\n+     CheckEligibilityQueryHandler handler) =>\n+     Results.Ok(handler.Handle(query)));\n+\n+ app.MapEligibilityEndpoints();', caption: 'POST /eligibility + règle d’architecture corrigée en même temps.' },
      { kind: 'split', kicker: 'Message clé', title: 'Les skills réduisent le bruit et les tokens.', left: '<div class="panel"><div class="head"><span>Token reduction</span><span>signal</span></div><div class="body"><ul class="bullets"><li>moins de répétition</li><li>moins de contexte redondant</li><li>plus de précision</li></ul></div></div>', right: '<div class="panel"><div class="head"><span>Effet direct</span><span>qualité</span></div><div class="body"><p class="lede">Le prompt devient une commande compacte: le modèle travaille avec les contraintes utiles, pas avec du texte parasite.</p></div></div>' },
      { kind: 'split', kicker: 'Craft', title: 'L’IA amplifie le software craftsmanship.', left: '<div class="panel"><div class="head"><span>Sans skills</span><span>bruit</span></div><div class="body"><p class="lede">On obtient des réponses vagues, des conventions oubliées et des dérives architecturelles.</p></div></div>', right: '<div class="panel"><div class="head"><span>Avec skills</span><span>pair senior</span></div><div class="body"><p class="lede">Le système guide l’agent comme un pair expert: la discussion reste technique, structurée et testable.</p></div></div>' },
      { kind: 'split', kicker: 'Rétrospective', title: 'Le workflow permet de voir ses propres erreurs.', left: '<div class="panel"><div class="head"><span>Apprentissage</span><span>session réelle</span></div><div class="body"><ul class="bullets"><li>Object Calisthenics rappelée par l’utilisateur</li><li>deux tests “accident” repérés après coup</li><li>une dette TDD corrigée en live</li></ul></div></div>', right: '<div class="panel"><div class="head"><span>Conclusion</span><span>honnêteté</span></div><div class="body"><p class="quote">Le process ne cache pas les bugs. Il les fait apparaître plus tôt et plus clairement.</p></div></div>' },
      { kind: 'split', kicker: 'Call to action', title: 'Refais la session à partir du repo.', left: '<div class="panel"><div class="head"><span>Repo</span><span>commits + spec</span></div><div class="body"><p class="lede">Les previews, la spec, le journal et les photos de commits sont déjà là. Le talk peut être rejoué et adapté à d’autres sujets.</p></div></div>', right: '<div class="panel"><div class="head"><span>QR / URL</span><span>final</span></div><div class="body"><p class="quote">Fork. Charge les skills. Rejoue le SDLC.</p></div></div>' },
      { kind: 'image', kicker: 'Récap', title: 'Le workflow parle.', image: 'assets/devops-ia.png', caption: 'Le fil conducteur est le même: preuve, cohérence, craft.' }
    ];

    const deck = document.getElementById('deck');
    const dots = document.getElementById('dots');
    const counter = document.getElementById('counter');

    function slideMarkup(slide, index) {
      const slideEl = document.createElement('section');
      slideEl.className = 'slide';
      slideEl.dataset.index = index;
      let inner = '';
      const heading = `<div class="kicker reveal">${slide.kicker ?? ''}</div><h1 class="reveal">${slide.title}</h1>`;

      if (slide.kind === 'hero') {
        inner = `<div class="slide-content hero">` +
          `<div class="reveal">${heading}<p class="lede reveal">${slide.body}</p><div class="reveal">${slide.meta}</div></div>` +
          `<div class="reveal">${slide.side}</div>` +
          `</div>`;
      } else if (slide.kind === 'split') {
        inner = `<div class="slide-content split">` +
          `<div>${heading}${slide.left}</div>` +
          `<div class="reveal">${slide.right}</div>` +
          `</div>`;
      } else if (slide.kind === 'table') {
        const rows = slide.table.map(row => `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2] ?? ''}</td></tr>`).join('');
        inner = `<div class="slide-content stack">${heading}<div class="panel reveal"><div class="head"><span>${slide.cols[0]}</span><span>${slide.cols[1]}</span><span>${slide.cols[2] ?? ''}</span></div><div class="body"><table class="table"><thead><tr>${slide.cols.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
      } else if (slide.kind === 'code') {
        inner = `<div class="slide-content stack">${heading}<pre class="code reveal">${slide.code}</pre></div>`;
      } else if (slide.kind === 'image') {
        inner = `<div class="slide-content stack">${heading}<div class="reveal"><img class="img" src="${slide.image}" alt="${slide.title}" /><div class="caption">${slide.caption}</div></div></div>`;
      } else if (slide.kind === 'commit') {
        const hasDiff = Boolean(slide.diff);
        inner = `<div class="slide-content stack">${heading}<div class="commit-card reveal${hasDiff ? ' has-diff' : ''}">` +
          `<div class="commit-media"><img class="commit-photo" src="${slide.image}" alt="${slide.title}" /><div class="caption">${slide.caption}</div></div>` +
          `${hasDiff ? `<pre class="code diff-block">${slide.diff}</pre>` : ''}` +
          `</div></div>`;
      }
      slideEl.innerHTML = inner;
      return slideEl;
    }

    slides.forEach((slide, index) => {
      deck.appendChild(slideMarkup(slide, index));
      const dot = document.createElement('span');
      dot.className = 'dot' + (index === 0 ? ' active' : '');
      dots.appendChild(dot);
    });

    const sections = [...document.querySelectorAll('.slide')];
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.querySelectorAll('.reveal').forEach((el, i) => {
            setTimeout(() => el.classList.add('in'), i * 80);
          });
          document.querySelectorAll('.dot').forEach((dot, idx) => dot.classList.toggle('active', idx === Number(entry.target.dataset.index)));
          counter.textContent = `${Number(entry.target.dataset.index) + 1} / ${sections.length}`;
        }
      });
    }, { threshold: 0.58 });

    sections.forEach(section => io.observe(section));

    let lock = false;
    function go(delta) {
      if (lock) return;
      lock = true;
      const current = sections.findIndex(s => s.getBoundingClientRect().top >= -10 && s.getBoundingClientRect().top < window.innerHeight / 2);
      const next = Math.min(sections.length - 1, Math.max(0, current + delta));
      sections[next].scrollIntoView({ behavior: matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth', block: 'start' });
      setTimeout(() => { lock = false; }, 420);
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp' || e.key === 'PageUp' || e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'Home') { e.preventDefault(); sections[0].scrollIntoView({ behavior: 'smooth' }); }
      if (e.key === 'End') { e.preventDefault(); sections[sections.length - 1].scrollIntoView({ behavior: 'smooth' }); }
    }, { passive: false });

    let wheel = 0;
    window.addEventListener('wheel', (e) => {
      wheel += e.deltaY;
      if (Math.abs(wheel) > 70) { e.preventDefault(); go(wheel > 0 ? 1 : -1); wheel = 0; }
    }, { passive: false });

    let touchY = null;
    window.addEventListener('touchstart', (e) => { touchY = e.changedTouches[0].clientY; }, { passive: true });
    window.addEventListener('touchend', (e) => {
      if (touchY == null) return;
      const diff = e.changedTouches[0].clientY - touchY;
      if (Math.abs(diff) > 36) go(diff < 0 ? 1 : -1);
      touchY = null;
    }, { passive: true });
  </script>
